# veu theme configuration
# Copy this file to ~/.config/veu/theme.conf to customise.
# Colour values are hex: #RRGGBB or #RRGGBBAA (AA = alpha, ff = fully opaque).
#
# Switch to a bundled theme by writing its name (without .conf) to
# ~/.config/veu/current-theme, e.g.:
#   echo catppuccin-mocha > ~/.config/veu/current-theme


# ── Placement ─────────────────────────────────────────────────────────────────

# Where the popup appears on screen.
# Options: top-right | top-left | top-center
#          bottom-right | bottom-left | bottom-center
#          center
placement = top-right

# Gap in pixels between the popup and the anchored screen edge(s).
# For top-* placements set this to at least your waybar height so the popup
# appears just below it rather than overlapping.
margin = 40


# ── Colours ───────────────────────────────────────────────────────────────────

# Popup window background (supports alpha for compositor blur).
background      = #1e1e2eee

# Primary text colour.
text            = #ffffff

# Accent colour — active slider rail and active mute button.
accent          = #ff9500

# Mute button background when audio is not muted.
button_inactive = #4d4d59

# Slider rail to the right of the handle (inactive portion).
slider_inactive = #ffffff33

# Slider handle.
handle          = #ffffff
